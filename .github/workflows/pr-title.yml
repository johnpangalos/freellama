# Requires PR titles to be Conventional Commits. The repo squash-merges with
# the PR title as the commit message, and Release Please builds the changelog
# from those commits — a malformed title would silently drop out of it.
# Hand-rolled on purpose: no third-party action, no checkout, just bash.
name: pr-title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions: {}

jobs:
  conventional:
    runs-on: ubuntu-latest
    steps:
      - name: Require Conventional Commit PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9./_-]+\))?!?: .+$'
          if printf '%s' "$TITLE" | grep -qE "$pattern"; then
            echo "PR title OK: $TITLE"
          else
            echo "::error::PR title must be a Conventional Commit — it becomes the squash commit and the changelog entry."
            echo "::error::Expected 'type(scope)?: summary' with type one of: feat fix docs refactor perf test build ci chore revert (append ! for breaking changes). Example: 'feat: add pull progress bar'."
            echo "::error::Got: '$TITLE'"
            exit 1
          fi
